  .bg-overlay{
    position:fixed;inset:0;
    background:linear-gradient(
      to bottom,
      rgba(10,4,0,0.15) 0%,
      rgba(10,4,0,0.05) 18%,
      rgba(10,4,0,0.05) 65%,
      rgba(10,4,0,0.72) 100%

  .wrap{
    position:relative;z-index:2;
    max-width:400px;width:100%;

  }

  /* 往下推，對齊背景圖 WANTED 文字中間位置 */

    text-align:center;
    margin-top:9vh;
    margin-bottom:0.5rem;
  }
  .wanted-text{
    font-size:56px;font-weight:900;
    color:#e8d5a3;
    letter-spacing:8px;
    font-family:Georgia,serif;
    text-shadow:0 2px 16px rgba(0,0,0,0.9), 0 0 40px rgba(200,150,50,0.4);
    display:block;line-height:1;
  }
  .dead-or-alive{
    font-size:13px;letter-spacing:5px;color:#c8a86a;
    font-family:Georgia,serif;margin-top:4px;
    text-shadow:0 1px 8px rgba(0,0,0,0.9);
  }

  /* 透明佔位讓人物身體露出 */

  .pw-card{
    width:100%;
    background:rgba(20,10,0,0.72);
    border:1.5px solid rgba(200,184,154,0.4);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-radius:20px;
    padding:1.5rem 1.75rem;
    text-align:center;
    box-shadow:0 8px 40px rgba(0,0,0,0.6);
  }

  .pw-title{font-size:21px;font-weight:800;color:#f0e6cc;margin-bottom:0.2rem;text-shadow:0 1px 8px rgba(0,0,0,0.6)}
  .pw-sub{font-size:13px;color:#c8a86a;margin-bottom:1rem;letter-spacing:0.5px}

  .pw-countdown{
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(200,184,154,0.2);
    border-radius:12px;padding:0.8rem 1rem;margin-bottom:1.1rem;
  }
  .pw-cd-label{font-size:9px;letter-spacing:3px;color:#c8a86a;font-weight:700;margin-bottom:8px;text-transform:uppercase}
  .pw-cd-digits{display:flex;justify-content:center;align-items:flex-end;gap:6px}
  .pw-digit{text-align:center;flex:1}
  .pw-digit-num{
    font-size:26px;font-weight:800;color:#e8d5a3;
    font-family:monospace;font-variant-numeric:tabular-nums;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(200,184,154,0.25);
    border-radius:8px;padding:5px 4px;display:block;line-height:1;
  }
  .pw-digit-lbl{font-size:9px;color:#a08060;margin-top:5px;letter-spacing:1px}
  .pw-sep{font-size:20px;font-weight:700;color:#c8a86a;padding-bottom:16px;opacity:0.5}
  .pw-cd-msg{font-size:11px;color:#c8a86a;margin-top:8px;min-height:16px;letter-spacing:0.5px}

  .pw-row{display:flex;gap:8px}
  .pw-row input{
    flex:1;padding:12px 14px;
    background:rgba(0,0,0,0.4);
    border:1.5px solid rgba(200,184,154,0.4);
    border-radius:10px;
    font-size:15px;outline:none;
    color:#f0e6cc;letter-spacing:1px;
    transition:border-color 0.2s;
  }
  .pw-row input::placeholder{color:rgba(200,184,154,0.4)}
  .pw-row input:focus{border-color:#c8a86a}
  .pw-row button{
    padding:12px 18px;
    background:linear-gradient(135deg,#c8a86a,#a07840);
    color:#1a0a00;border:none;border-radius:10px;
    font-size:14px;font-weight:800;cursor:pointer;
    letter-spacing:1px;white-space:nowrap;
    transition:opacity 0.2s;
  }
  .pw-row button:hover{opacity:0.85}
  .pw-error{font-size:12px;color:#e07050;margin-top:10px;min-height:18px;letter-spacing:0.5px}
  .bounty{margin-top:1rem;font-size:11px;color:rgba(200,184,154,0.35);letter-spacing:2px}

<body>
<div class="bg"></div>
<div class="bg-overlay"></div>

<div class="wrap">
  <div class="wanted-badge">
    <span class="wanted-text">WANTED</span>
    <div class="dead-or-alive">— DEAD OR ALIVE —</div>
  </div>

  <div class="spacer"></div>

  <div class="pw-card">
    <div class="pw-title">生日死亡倒數 💀</div>
    <div class="pw-sub">距離你的末日還有</div>

    <div class="pw-countdown">
      <div class="pw-cd-label">Birthday Doomsday Countdown</div>
      <div class="pw-cd-digits">
        <div class="pw-digit"><span class="pw-digit-num" id="pw-d">--</span><div class="pw-digit-lbl">天</div></div>
        <div class="pw-sep">:</div>
        <div class="pw-digit"><span class="pw-digit-num" id="pw-h">--</span><div class="pw-digit-lbl">時</div></div>
        <div class="pw-sep">:</div>
        <div class="pw-digit"><span class="pw-digit-num" id="pw-m">--</span><div class="pw-digit-lbl">分</div></div>
        <div class="pw-sep">:</div>
        <div class="pw-digit"><span class="pw-digit-num" id="pw-s">--</span><div class="pw-digit-lbl">秒</div></div>
      </div>
      <div class="pw-cd-msg" id="pw-msg">💀 逃不掉的</div>
    </div>

    <div class="pw-row">
      <input type="password" id="pw" placeholder="輸入授權碼" onkeydown="if(event.key==='Enter')unlock()" autofocus />
      <button onclick="unlock()">解鎖</button>
    </div>
    <div class="pw-error" id="pw-err"></div>
    <div class="bounty">William · $770 · MARINE</div>
  </div>
</div>

<script>
  const HASH = "7ccd300d6910212d4b97d77af62a98412d63c2924f96c17b02ec98e9e9c22dad";
  const birthdayTarget = new Date('2026-07-19T08:00:00+08:00');

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  async function unlock() {
    const h = await sha256(document.getElementById('pw').value);
    if (h === HASH) {
      window.location.href = 'info.html';
    } else {
      document.getElementById('pw-err').textContent = '授權碼錯誤，任務拒絕存取。';
      document.getElementById('pw').select();
    }
  }

  function tick() {
    const diff = birthdayTarget - new Date();
    if (diff <= 0) {
      ['pw-d','pw-h','pw-m','pw-s'].forEach(id=>document.getElementById(id).textContent='00');
      document.getElementById('pw-msg').textContent='重生日已到！';
      return;
    }
    document.getElementById('pw-d').textContent=String(Math.floor(diff/86400000)).padStart(2,'0');
    document.getElementById('pw-h').textContent=String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('pw-m').textContent=String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('pw-s').textContent=String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  }
  tick(); setInterval(tick,1000);

  const msgs=['🎂 生日快樂？還是生日不快樂？','⏳ 時間一秒一秒流逝','😈 倒數中，準備好了嗎','🔫 $770 懸賞中'];
  let i=0;
  setInterval(()=>{i=(i+1)%msgs.length;document.getElementById('pw-msg').textContent=msgs[i];},3500);
</script>
</body>
